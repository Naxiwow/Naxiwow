<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-lg" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-text" x="-10%" y="-20%" width="120%" height="140%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="bg" cx="28%" cy="52%" r="80%">
    <stop offset="0%" stop-color="#1c000c"/>
    <stop offset="55%" stop-color="#0c0006"/>
    <stop offset="100%" stop-color="#030003"/>
  </radialGradient>
  <linearGradient id="petal-g" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#6b0000"/>
    <stop offset="35%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="#ff3333"/>
  </linearGradient>
  <radialGradient id="iris-g" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#ff3300"/>
    <stop offset="60%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="#7a0000"/>
  </radialGradient>
  <style>
    @keyframes breathe { 0%,100%{opacity:.9} 50%{opacity:.35} }
    @keyframes aura-breathe { 0%,100%{opacity:.06} 50%{opacity:.02} }
    @keyframes stamen-breathe { 0%,100%{opacity:.95} 50%{opacity:.65} }
    .eye-pulse { animation: breathe 3s ease-in-out infinite; }
    .aura { animation: aura-breathe 5s ease-in-out infinite; }
    .stamens { animation: stamen-breathe 4s ease-in-out infinite; }
  </style>
</defs>

<!-- Background -->
<rect width="1200" height="420" fill="url(#bg)"/>

<!-- Ghost kanji -->
<text x="-30" y="390" font-family="serif" font-size="440" fill="#cc0000" opacity="0.022" font-weight="bold">喰</text>
<text x="880" y="440" font-family="serif" font-size="380" fill="#8b0000" opacity="0.018" font-weight="bold">死</text>

<!-- Ambient aura behind lily -->
<circle cx="248" cy="238" r="210" fill="#cc0000" class="aura"/>
<circle cx="248" cy="238" r="140" fill="#cc0000" opacity="0.05" class="aura"/>
<circle cx="248" cy="238" r="85"  fill="#cc0000" opacity="0.06" class="aura"/>

<!-- Blood particles -->
<circle cx="55"  cy="48"  r="1.5" fill="#cc0000" opacity="0.55"/>
<circle cx="98"  cy="88"  r="1"   fill="#cc0000" opacity="0.38"/>
<circle cx="375" cy="32"  r="1.5" fill="#cc0000" opacity="0.32"/>
<circle cx="425" cy="378" r="1"   fill="#cc0000" opacity="0.42"/>
<circle cx="178" cy="368" r="2"   fill="#cc0000" opacity="0.28"/>
<circle cx="318" cy="392" r="1"   fill="#8b0000" opacity="0.45"/>
<circle cx="48"  cy="318" r="1.5" fill="#8b0000" opacity="0.32"/>
<circle cx="408" cy="148" r="1"   fill="#cc0000" opacity="0.22"/>
<circle cx="142" cy="38"  r="1.5" fill="#8b0000" opacity="0.38"/>
<circle cx="358" cy="58"  r="1"   fill="#cc0000" opacity="0.32"/>
<circle cx="30"  cy="180" r="1"   fill="#cc0000" opacity="0.25"/>
<circle cx="460" cy="280" r="1.5" fill="#8b0000" opacity="0.22"/>

<!-- ===== SPIDER LILY (center: 248, 240) ===== -->
<g transform="translate(248,240)">

  <!-- Soft glow halo -->
  <circle r="90" fill="#cc0000" opacity="0.05"/>

  <!-- STAMENS — 8 curved, extending ~115px -->
  <g class="stamens" stroke-linecap="round">
    <path d="M0,0 Q7,-58 12,-118"  stroke="#ff7744" stroke-width="1.2" fill="none"/>
    <circle cx="12"  cy="-118" r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q48,-22 112,-18" stroke="#ff7744" stroke-width="1.2" fill="none"/>
    <circle cx="112" cy="-18"  r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q45,32 100,72"   stroke="#ff6633" stroke-width="1.2" fill="none"/>
    <circle cx="100" cy="72"   r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q8,58 12,118"    stroke="#ff6633" stroke-width="1.2" fill="none"/>
    <circle cx="12"  cy="118"  r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q-40,32 -95,68"  stroke="#ff6633" stroke-width="1.2" fill="none"/>
    <circle cx="-95" cy="68"   r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q-50,-18 -115,-12" stroke="#ff7744" stroke-width="1.2" fill="none"/>
    <circle cx="-115" cy="-12" r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q-30,-52 -62,-112" stroke="#ff7744" stroke-width="1.2" fill="none"/>
    <circle cx="-62" cy="-112" r="2.8" fill="#ff9966"/>
    <path d="M0,0 Q-5,-60 -5,-120"  stroke="#ff7744" stroke-width="1.2" fill="none"/>
    <circle cx="-5"  cy="-120" r="2.8" fill="#ff9966"/>
  </g>

  <!-- PETALS (6, reflexed, narrow base, wider mid, curved tip) -->
  <g fill="url(#petal-g)">
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(0)"/>
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(60)"/>
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(120)"/>
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(180)"/>
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(240)"/>
    <path d="M0,0 C8,-12 18,-30 16,-52 C13,-74 8,-84 2,-92 C-1,-96 -7,-93 -9,-86 C-13,-72 -15,-54 -13,-38 C-10,-22 -5,-10 0,0" transform="rotate(300)"/>
  </g>

  <!-- Flower center -->
  <circle r="15" fill="#ff2200" filter="url(#glow)"/>
  <circle r="9"  fill="#ff5533"/>
  <circle r="5"  fill="#ffaa88"/>

  <!-- Stem -->
  <path d="M4,15 Q12,80 18,148" stroke="#3a1800" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M4,15 Q12,80 18,148" stroke="#6b3000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</g>

<!-- ===== KAKUGAN EYE (above lily: 248, 98) ===== -->
<g transform="translate(248,98)">
  <!-- Glow halo -->
  <ellipse rx="55" ry="35" fill="#cc0000" opacity="0.12" class="eye-pulse" filter="url(#glow-lg)"/>
  <!-- Black sclera -->
  <ellipse rx="44" ry="26" fill="#080005"/>
  <!-- Red iris with radial gradient -->
  <ellipse rx="26" ry="23" fill="url(#iris-g)" class="eye-pulse"/>
  <!-- Iris rings detail -->
  <ellipse rx="24" ry="21" fill="none" stroke="#ff4444" stroke-width="0.8" opacity="0.5"/>
  <ellipse rx="19" ry="17" fill="none" stroke="#ff3333" stroke-width="0.5" opacity="0.35"/>
  <!-- Pupil — vertical slit -->
  <ellipse rx="5" ry="16" fill="#000000"/>
  <!-- Reflections -->
  <ellipse cx="-9" cy="-8" rx="5" ry="3" fill="#ffffff" opacity="0.3"/>
  <circle  cx="7"  cy="-5" r="2"          fill="#ffffff" opacity="0.18"/>
  <!-- Upper/lower eyelid suggestion -->
  <path d="M-44,-26 C-35,-34 -22,-36 -10,-30 C0,-25 10,-25 20,-30 C32,-36 40,-34 44,-26" stroke="#1a0008" stroke-width="2" fill="none"/>
  <path d="M-44,26 C-35,34 -22,36 -10,30 C0,25 10,25 20,30 C32,36 40,34 44,26" stroke="#1a0008" stroke-width="1.5" fill="none"/>
</g>

<!-- ===== DIAGONAL SLASH DIVIDER ===== -->
<polygon points="482,0 496,0 462,420 448,420" fill="#3d0010" opacity="0.5"/>
<line x1="497" y1="0" x2="463" y2="420" stroke="#cc0000" stroke-width="0.8" opacity="0.35"/>
<line x1="446" y1="0" x2="412" y2="420" stroke="#8b0000" stroke-width="0.5" opacity="0.2"/>

<!-- ===== TEXT — right zone (x > 510) ===== -->

<!-- NAXIWOW -->
<text x="534" y="210" font-family="'Times New Roman',Georgia,serif" font-size="100" fill="#f5f0f0" font-weight="bold" letter-spacing="-4" filter="url(#glow-text)">NAXIWOW</text>

<!-- Red underline accent -->
<rect x="534" y="218" width="640" height="1.5" fill="#cc0000" opacity="0.5"/>

<!-- 不喰種 -->
<text x="538" y="258" font-family="'Times New Roman',Georgia,serif" font-size="26" fill="#cc0000" letter-spacing="6">不喰種  ·  Discord Developer</text>

<!-- Divider line -->
<line x1="538" y1="274" x2="1155" y2="274" stroke="#3d0010" stroke-width="0.8" opacity="0.7"/>

<!-- Stack -->
<text x="538" y="300" font-family="'Times New Roman',Georgia,serif" font-size="15" fill="#7a2020" letter-spacing="3">Python  ·  TypeScript  ·  discord.py-self</text>

<!-- CCG classification -->
<text x="538" y="332" font-family="'Times New Roman',Georgia,serif" font-size="13.5" fill="#4d1010" letter-spacing="4">◈  彼岸花  ·  CCG  SS-RANK  ·  Anteiku  ア  ◈</text>

<!-- Corner decorative dots -->
<circle cx="1168" cy="185" r="2"   fill="#cc0000" opacity="0.45"/>
<circle cx="1178" cy="195" r="1.5" fill="#8b0000" opacity="0.35"/>
<circle cx="1183" cy="178" r="1"   fill="#cc0000" opacity="0.28"/>
<circle cx="1188" cy="208" r="1.5" fill="#8b0000" opacity="0.22"/>
<circle cx="1160" cy="215" r="1"   fill="#cc0000" opacity="0.3"/>

</svg>
